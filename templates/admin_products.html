{% extends "base.html" %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="m-0">Products</h1>
    <a class="btn btn-primary" href="/admin/products/new">+ New product</a>
  </div>

  <table class="table table-striped align-middle"> <thead>
      <tr>
        <th>ID</th>
        <th>Image</th> <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th> </tr>
    </thead>
    <tbody>
      {% for p in products %}
        <tr>
          <td>{{ p.id }}</td>
          
          <td>
            <img src="{{ url_for('static', filename='images/' + p.image_file) }}" 
                 alt="{{ p.name }}" 
                 class="img-thumbnail" 
                 style="width: 50px; height: 50px; object-fit: cover;">
          </td>
          <td>{{ p.name }}</td>
          <td>{{ p.category or "" }}</td>
          <td>{{ "%.2f"|format(p.price) }}</td>
          <td>{{ p.stock }}</td>
          <td>
            <a class="btn btn-sm btn-outline-secondary" href="/admin/products/{{ p.id }}/edit">Edit</a>

            <form method="post" action="/admin/products/{{ p.id }}/delete" style="display:inline;"
                onsubmit="return confirm('Delete {{ p.name }}?');">
              <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
